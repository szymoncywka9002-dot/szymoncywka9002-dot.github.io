<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Galeria | Gabinet MOC NATURY</title>

<style>
*{
box-sizing:border-box;
margin:0;
padding:0;
font-family:Arial,sans-serif
}

body{
background:
linear-gradient(rgba(5,20,15,.55), rgba(5,20,15,.65)),
radial-gradient(circle at 20% 30%, rgba(212,175,55,.55), transparent 12%),
radial-gradient(circle at 80% 70%, rgba(212,175,55,.25), transparent 55%),
url("tlo.png") center/cover fixed no-repeat;
color:#f5f5f5;
}

/* MENU */

.navbar{
position:sticky;
top:0;
background:rgba(5,20,15,.95);
border-bottom:1px solid rgba(212,175,55,.45);
}

.nav-inner{
max-width:1200px;
margin:auto;
padding:14px 20px;
display:flex;
justify-content:space-between;
}

.nav-logo{
color:#d4af37;
font-weight:bold;
text-decoration:none;
}

.nav-links{
display:flex;
gap:18px;
flex-wrap:wrap;
}

.nav-links a{
color:white;
text-decoration:none;
}

.nav-links a:hover{
color:#d4af37;
}

/* GALERIA */

.container{
max-width:1200px;
margin:80px auto;
padding:20px;
}

h1{
text-align:center;
color:#d4af37;
margin-bottom:40px;
font-size:42px;
}

.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:22px;
}

.gallery img{
width:100%;
height:230px;
object-fit:cover;
border-radius:16px;
border:2px solid rgba(212,175,55,.35);
cursor:pointer;
transition:.35s;
}

.gallery img:hover{
transform:scale(1.05);
border-color:#d4af37;
box-shadow:0 0 20px rgba(212,175,55,.35);
}

/* LIGHTBOX */

.lightbox{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.92);
display:none;
justify-content:center;
align-items:center;
flex-direction:column;
z-index:2000;
}

.lightbox.active{
display:flex;
}

.lightbox img{
max-width:90%;
max-height:80%;
border-radius:12px;
}

.controls{
margin-top:20px;
display:flex;
gap:20px;
}

.btn{
background:#d4af37;
color:#0e2b1f;
border:none;
padding:10px 18px;
font-size:18px;
border-radius:6px;
cursor:pointer;
}

.btn:hover{
opacity:.85;
}

/* STOPKA */

footer{
text-align:center;
padding:30px;
color:#d4af37;
border-top:1px solid rgba(212,175,55,.35);
margin-top:60px;
}
</style>
</head>

<body>

<nav class="navbar">
<div class="nav-inner">

<a href="index.html" class="nav-logo">MOC NATURY</a>

<div class="nav-links">
<a href="index.html">Start</a>
<a href="onas.html">O nas</a>
<a href="galeria.html">Galeria</a>
<a href="cennik.html">Cennik</a>
</div>

</div>
</nav>

<div class="container">

<h1>Galeria</h1>

<div class="gallery">

<img src="certyfikaty.jpg" onclick="openImage(0)">
<img src="certyfikat1.jpg" onclick="openImage(1)">
<img src="certyfikat2.jpg" onclick="openImage(2)">
<img src="certyfikat3.jpg" onclick="openImage(3)">
<img src="banki.jpg" onclick="openImage(4)">
<img src="bank2.jpg" onclick="openImage(5)">
<img src="brt.jpg" onclick="openImage(6)">
<img src="bio.jpg" onclick="openImage(7)"> 
<img src="konchy.jpg" onclick="openImage(8)">
<img src="koncha2.jpg" onclick="openImage(9)">
<img src="gabinet.jpg" onclick="openImage(10)">
<img src="gabinet2.jpg" onclick="openImage(11)">
<img src="cennik.jpg" onclick="openImage(12)">
</div>

</div>

<div class="lightbox" id="lightbox">

<img id="lightbox-img">

<div class="controls">
<button class="btn" onclick="prevImage()">←</button>
<button class="btn" onclick="closeImage()">✕</button>
<button class="btn" onclick="nextImage()">→</button>
</div>

</div>

<footer>
© <span id="year"></span> Gabinet MOC NATURY
</footer>

<script>

document.getElementById("year").textContent=new Date().getFullYear();

const images=[
"certyfikaty.jpg",
"certyfikat1.jpg",
"certyfikat2.jpg",
"certyfikat3.jpg",
"banki.jpg",
"bank2.jpg",  
"brt.jpg",
"bio.jpg",
"konchy.jpg",  
"koncha2.jpg",
"gabinet.jpg",
"gabinet2.jpg",
"cennik.jpg"  
]

let current=0

function openImage(index){
current=index
document.getElementById("lightbox").classList.add("active")
document.getElementById("lightbox-img").src=images[current]
}

function closeImage(){
document.getElementById("lightbox").classList.remove("active")
}

function nextImage(){
current++
if(current>=images.length){current=0}
document.getElementById("lightbox-img").src=images[current]
}

function prevImage(){
current--
if(current<0){current=images.length-1}
document.getElementById("lightbox-img").src=images[current]
}

document.addEventListener("keydown",function(e){

if(e.key==="Escape"){closeImage()}
if(e.key==="ArrowRight"){nextImage()}
if(e.key==="ArrowLeft"){prevImage()}

})

</script>

</body>
</html>
