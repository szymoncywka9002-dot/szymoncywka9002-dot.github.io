<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:Arial,sans-serif}

body{
background:
linear-gradient(rgba(5,20,15,.55), rgba(5,20,15,.65)),
radial-gradient(circle at 20% 30%, rgba(212,175,55,.55), transparent 12%),
radial-gradient(circle at 80% 70%, rgba(212,175,55,.25), transparent 55%),
url("tlo.png") center/cover fixed no-repeat;
color:#f5f5f5;
}

/* MENU */
.navbar{
position:sticky;
top:0;
background:rgba(5,20,15,.95);
border-bottom:1px solid rgba(212,175,55,.45);
}

.nav-inner{
max-width:1200px;
margin:auto;
padding:14px 20px;
display:flex;
justify-content:space-between;
}

.nav-logo{
color:#d4af37;
text-decoration:none;
font-weight:bold;
}

.nav-links{
display:flex;
gap:18px;
flex-wrap:wrap;
}

.nav-links a{
color:white;
text-decoration:none;
}

.nav-links a:hover{
color:#d4af37;
}

/* GALERIA */

.container{
max-width:1100px;
margin:80px auto;
padding:20px;
}

h1{
text-align:center;
color:#d4af37;
margin-bottom:40px;
}

.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.gallery img{
width:100%;
height:220px;
object-fit:cover;
border-radius:14px;
border:2px solid rgba(212,175,55,.35);
transition:.3s;
}

.gallery img:hover{
transform:scale(1.05);
border-color:#d4af37;
}

footer{
text-align:center;
padding:30px;
color:#d4af37;
border-top:1px solid rgba(212,175,55,.35);
margin-top:60px;
}
